apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: auth-tunnel-certificate
  namespace: auth
spec:
  secretName: auth-services-tls
  issuerRef:
    name: carverauto-issuer
    kind: ClusterIssuer
  commonName: tunnel.carverauto.dev
  dnsNames:
  - tunnel.carverauto.dev
  - '*.tunnel.carverauto.dev'
