apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: threadr-control-plane
  labels:
    app.kubernetes.io/name: threadr-control-plane
    app.kubernetes.io/component: web
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: threadr-control-plane
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
