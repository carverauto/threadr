apiVersion: apps/v1
kind: Deployment
metadata:
  name: threadr-control-plane
spec:
  template:
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/carverauto/threadr/threadr-control-plane@sha256:REPLACE_ME
      containers:
        - name: threadr-control-plane
          image: ghcr.io/carverauto/threadr/threadr-control-plane@sha256:REPLACE_ME
---
apiVersion: batch/v1
kind: Job
metadata:
  name: threadr-bootstrap-operator-admin
spec:
  template:
    spec:
      containers:
        - name: bootstrap-operator-admin
          image: ghcr.io/carverauto/threadr/threadr-control-plane@sha256:REPLACE_ME
