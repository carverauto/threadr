apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: threadr-control-plane
spec:
  tls:
    - hosts:
        - threadr.example.com
      secretName: threadr-control-plane-tls
  rules:
    - host: threadr.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: threadr-control-plane
                port:
                  number: 80
