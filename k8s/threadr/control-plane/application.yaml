apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: threadr-control-plane
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:carverauto/threadr.git
    targetRevision: HEAD
    path: k8s/threadr/overlays/control-plane/production
  destination:
    server: https://kubernetes.default.svc
    namespace: threadr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
