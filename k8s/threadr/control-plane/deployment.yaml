apiVersion: apps/v1
kind: Deployment
metadata:
  name: threadr-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: threadr-control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: threadr-control-plane
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: threadr-control-plane
      initContainers:
        - name: migrate
          image: threadr-control-plane:latest
          imagePullPolicy: IfNotPresent
          command: ["bin/threadr", "eval", "Threadr.ReleaseTasks.migrate()"]
          envFrom:
            - configMapRef:
                name: threadr-control-plane-config
            - secretRef:
                name: threadr-control-plane-env
          env:
            - name: PHX_SERVER
              value: "false"
      containers:
        - name: threadr-control-plane
          image: threadr-control-plane:latest
          imagePullPolicy: IfNotPresent
          command: ["bin/threadr", "start"]
          ports:
            - name: http
              containerPort: 4000
          envFrom:
            - configMapRef:
                name: threadr-control-plane-config
            - secretRef:
                name: threadr-control-plane-env
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
