apiVersion: v1
kind: Secret
metadata:
  name: threadr-control-plane-env
  namespace: threadr
type: Opaque
stringData:
  DATABASE_URL: ecto://postgres:postgres@cnpg-rw.threadr.svc.cluster.local/threadr_prod
  SECRET_KEY_BASE: replace-me
  THREADR_DB_HOST: cnpg-rw.threadr.svc.cluster.local
  THREADR_DB_PORT: "5432"
  THREADR_NATS_HOST: nats.nats.svc.cluster.local
  THREADR_NATS_PORT: "4222"
  THREADR_TOKEN_SIGNING_SECRET: replace-me
  THREADR_CONTROL_PLANE_TOKEN: replace-me
  THREADR_SYSTEM_LLM_ADAPTER: Threadr.ML.Generation.ChatCompletionsProvider
  THREADR_SYSTEM_LLM_PROVIDER: openai
  THREADR_SYSTEM_LLM_ENDPOINT: https://api.openai.com/v1/chat/completions
  THREADR_SYSTEM_LLM_MODEL: gpt-4.1-mini
  THREADR_SYSTEM_LLM_API_KEY: replace-me
