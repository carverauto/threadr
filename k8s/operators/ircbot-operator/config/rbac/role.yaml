---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cache.threadr.ai
  resources:
  - ircbots
  - threadrbots
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cache.threadr.ai
  resources:
  - ircbots/finalizers
  - threadrbots/finalizers
  verbs:
  - update
- apiGroups:
  - cache.threadr.ai
  resources:
  - ircbots/status
  - threadrbots/status
  verbs:
  - get
  - patch
  - update
