---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: threadrbots.cache.threadr.ai
spec:
  group: cache.threadr.ai
  names:
    kind: ThreadrBot
    listKind: ThreadrBotList
    plural: threadrbots
    singular: threadrbot
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.desiredState
      name: State
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.controlPlane.generation
      name: Generation
      type: integer
    - jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ThreadrBot is the Schema for the threadrbots API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ThreadrBotSpec defines the desired state of ThreadrBot.
            properties:
              channels:
                description: Channels is the list of channels that the bot should
                  join or monitor.
                items:
                  type: string
                type: array
              controlPlane:
                description: ControlPlane identifies the backing Threadr control-plane
                  bot record and generation.
                properties:
                  botId:
                    description: BotID is the public control-plane bot UUID.
                    type: string
                  generation:
                    description: Generation is the desired generation from the Threadr
                      control plane.
                    format: int64
                    minimum: 1
                    type: integer
                  tenantId:
                    description: TenantID is the Threadr tenant UUID.
                    type: string
                  tenantSubject:
                    description: TenantSubject is the NATS-safe tenant subject token.
                    type: string
                required:
                - botId
                - generation
                - tenantId
                - tenantSubject
                type: object
              desiredState:
                description: DesiredState is the intended runtime state for the bot
                  workload.
                enum:
                - running
                - stopped
                - deleted
                type: string
              platform:
                description: Platform identifies the upstream chat platform, for example
                  irc or discord.
                type: string
              workload:
                description: Workload contains the rendered runtime workload for the
                  cluster.
                properties:
                  containerName:
                    default: threadr-bot
                    description: ContainerName is the container name used inside the
                      bot deployment.
                    type: string
                  deploymentName:
                    description: DeploymentName is the stable Kubernetes deployment
                      name for the bot.
                    type: string
                  env:
                    description: Env contains the environment variables for the container.
                    items:
                      description: ThreadrBotEnvVar declares an environment variable
                        for the bot container.
                      properties:
                        name:
                          type: string
                        value:
                          type: string
                      required:
                      - name
                      - value
                      type: object
                    type: array
                  image:
                    description: Image is the container image the controller should
                      run.
                    type: string
                  replicas:
                    description: Replicas is the desired replica count for the deployment.
                    format: int32
                    minimum: 0
                    type: integer
                required:
                - deploymentName
                - image
                - replicas
                type: object
            required:
            - controlPlane
            - desiredState
            - platform
            - workload
            type: object
          status:
            description: ThreadrBotStatus defines the observed state of ThreadrBot.
            properties:
              availableReplicas:
                description: AvailableReplicas is the number of available pods in
                  the backing deployment.
                format: int32
                type: integer
              conditions:
                description: Conditions mirrors the key deployment conditions observed
                  by the controller.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              deploymentName:
                description: DeploymentName is the backing Kubernetes deployment name.
                type: string
              lastObservedAt:
                description: LastObservedAt records when the controller last wrote
                  workload status.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation the controller has
                  applied or observed.
                format: int64
                type: integer
              phase:
                description: Phase is the current lifecycle state observed by the
                  controller.
                enum:
                - reconciling
                - running
                - stopped
                - degraded
                - deleting
                - error
                type: string
              readyReplicas:
                description: ReadyReplicas is the number of ready pods in the backing
                  deployment.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
